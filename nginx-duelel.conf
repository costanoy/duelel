# /etc/nginx/sites-available/duelel  (depois: ln -s ... sites-enabled/ && nginx -t && systemctl reload nginx)
# TLS: use certbot --nginx -d duelel.cyberhat.com.br para gerar os certificados.

server {
    listen 80;
    server_name duelel.cyberhat.com.br;
    # redireciona para HTTPS (o certbot costuma adicionar isso sozinho)
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name duelel.cyberhat.com.br;

    # ssl_certificate     /etc/letsencrypt/live/duelel.cyberhat.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/duelel.cyberhat.com.br/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # --- ESSENCIAL para o WebSocket funcionar ---
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        # --------------------------------------------

        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;   # não derruba conexões ociosas
    }
}
